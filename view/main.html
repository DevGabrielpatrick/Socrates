<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiais</title>

    <link rel="stylesheet" href="./Estilo/main.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <img src="./imagens/socrates.png" alt="Logo">
        </div>

        <button class="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav>
            <a href="/home" class="ativo" title="Home">
                <img src="./imagens/Imagem1.png" alt="Dashboard">
            </a>
            <a href="/pesquisa" title="Pesquisar">
                <img src="./imagens/imagem5.png" alt="Dashboard">
            </a>
            <a href="/materiais" title="Materiais">
                <img src="./imagens/imagem6.png" alt="Materiais">
            </a>
            <a href="/upload" title="Upload">
               <img src="./imagens/imagem7.png" alt="Adicionar conteudo">
            </a>
            <a href="/alterar_perfil" title="Perfil">
                <img src="./imagens/Imagem2.png" alt="Perfil">
            </a>
        </nav>

        <div class="logout">
            <a href="/logout" title="Sair">
                <img src="./imagens/Imagem3.png" alt="Perfil">
            </a>
        </div>
    </aside>

    <main class="conteudo">
        <header>
            <div class="pesquisa">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Pesquisar Material">
            </div>

            <a href="/alterar_perfil" title="Meu perfil">
                <img src="{{FOTO}}" alt="{{NOME}}" class="avatar">
            </a>
        </header>

        <section class="topo">
            <h2>{{SAUDACAO}}, {{NOME}}!</h2>

            <div class="filtros">
                <button class="ativo">Tudo</button>
                <button>Vídeos</button>
                <button>Apostilas</button>
            </div>
        </section>

        <section class="cards" id="container-catalogo"></section>
    </main>

    <script>
        fetch('/api/todos_projetos?nocache=' + new Date().getTime())
        .then(response => response.json())
        .then(projetos => {
            const container = document.getElementById('container-catalogo');
            container.innerHTML = ''; 

            if (projetos.length === 0) {
                container.innerHTML = '<h3 style="color: white; width: 100%; text-align: center;">Nenhum material encontrado no catálogo ainda.</h3>';
                return;
            }

            projetos.forEach(projeto => {
                const imagemSrc = projeto.capaUrl ? projeto.capaUrl : './imagens/Imagem4.png';
                
                const usr = projeto.Usuario || projeto.usuario;
                const fotoAutor = usr ? (usr.FotoPerfil || usr.fotoPerfil || usr.fotoperfil || usr.foto_perfil || usr.foto || './imagens/imagem8.jpg') : './imagens/imagem8.jpg';
                const nomeAutor = usr ? (usr.Nome || usr.nome || 'Usuário Desconhecido') : 'Usuário Desconhecido';
                
                const cardHTML = `
                    <div class="card">
                        <img src="${imagemSrc}" alt="Capa" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px 8px 0 0;">
                        
                        <div class="autor">
                             <img src="${fotoAutor}" alt="Avatar do Autor" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover;">
                             <span>Autor(a): ${nomeAutor}</span>
                        </div>

                        <h3 style="margin-top: 10px;">${projeto.titulo}</h3>

                        <div class="info">
                            <span>Dificuldade</span>
                            <span>${projeto.dificuldade}</span>
                        </div>

                        <div class="info">
                            <span>Tipo</span>
                            <span>${projeto.tipo}</span>
                        </div>

                        <button class="btn-card" ${projeto.materialUrl ? `onclick="abrirVisualizador('${projeto.materialUrl}', '${projeto.tipo}')"` : `onclick="alert('Este projeto não possui nenhum arquivo de material anexado.')"`}>Visualizar</button>
                    </div>
                    `;
                    container.innerHTML += cardHTML;
                });
            })
            .catch(err => console.error('Erro ao carregar o catálogo:', err));
    </script>

    <script>
        const botao = document.querySelector(".menu-btn");
        const sidebar = document.querySelector(".sidebar");

        botao.addEventListener("click", () => {
            sidebar.classList.toggle("ativo");
        });

        function abrirVisualizador(url, tipo) {
            const modalAntigo = document.getElementById('modal-visualizador');
            if (modalAntigo) modalAntigo.remove();

            const modal = document.createElement('div');
            modal.id = 'modal-visualizador';
            modal.style.cssText = `
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
              background: rgba(0, 0, 0, 0.85);
              display: flex; justify-content: center; align-items: center;
              z-index: 100000; padding: 20px;
            `;

         const contentor = document.createElement('div');
         contentor.style.cssText = `
              position: relative; background: #1e1e2f; 
               padding: 15px; border-radius: 12px; 
              max-width: 90%; max-height: 90%; 
              display: flex; flex-direction: column; align-items: center;
             box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    `;

         const btnFechar = document.createElement('button');
            btnFechar.textContent = '×';
         btnFechar.style.cssText = `
              position: absolute; top: -15px; right: -15px;
             background: #ff5454; color: white; border: none;
                width: 32px; height: 32px; border-radius: 50%;
             font-size: 22px; cursor: pointer; display: flex;
              align-items: center; justify-content: center;
             box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    `;
         btnFechar.onclick = () => modal.remove();
         contentor.appendChild(btnFechar);

         if (tipo === 'Imagem') {
              const img = document.createElement('img');
              img.src = url;
              img.style.cssText = 'max-width: 100%; max-height: 75vh; border-radius: 6px;';
              contentor.appendChild(img);
         } else if (tipo === 'Video') {
              const video = document.createElement('video');
              video.src = url;
                video.controls = true;
              video.autoplay = true;
             video.style.cssText = 'max-width: 100%; max-height: 75vh; border-radius: 6px;';
                contentor.appendChild(video);
          } else if (tipo === 'PDF') {
             const iframe = document.createElement('iframe');
              iframe.src = url;
              iframe.style.cssText = 'width: 75vw; height: 75vh; border: none; border-radius: 6px;';
              contentor.appendChild(iframe);
          } else {
               modal.remove();
              alert('Formato de arquivo não suportado para pré-visualização.');
             return;
         }

          modal.appendChild(contentor);
         document.body.appendChild(modal);

         modal.onclick = (e) => {
               if (e.target === modal) modal.remove();
          };
        }
    </script>
    
    <script src="./interceptor.js"></script>
</body>
</html>
