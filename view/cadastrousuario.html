<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./Estilo/login.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container-geral">

        <div class="circulo">
            <img src="./imagens/socrates.png" alt="Logo">
        </div>

        <div class="container">

            <h1>Cadastro</h1>

            <form action="/cadastrar_usuario" method="POST">

                <div class="campo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha:</label>
                    <div class="senha-wrapper">
                        <input type="password" id="senha" name="senha" required>
                        <button type="button" class="olho-btn" data-alvo="senha" aria-label="Mostrar senha">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="campo">
                    <label for="confirmar-senha">Confirmar senha:</label>
                    <div class="senha-wrapper">
                        <input type="password" id="confirmar-senha" name="confirmarSenha" required>
                        <button type="button" class="olho-btn" data-alvo="confirmar-senha" aria-label="Mostrar senha">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="campo">
                    <label for="perfil">Perfil:</label>
                    <select id="perfil" name="perfil" required style="width: 100%; padding: 8px; border-radius: 4px;">
                        <option value="aluno">Aluno</option>
                        <option value="professor">Professor</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="area">Área de Conhecimento:</label>
                    <input type="text" id="area" name="area" required>
                </div>

                <div class="campo">
                    <label for="curso">Curso:</label>
                    <input type="text" id="curso" name="curso" required>
                </div>

                <button type="submit">
                    Cadastrar
                </button>

            </form>

        </div>

    </div>

    <script src="./interceptor.js"></script>
    <script>
        // Toggle do botão de olho (mesmo padrão do login.html)
        document.querySelectorAll('.olho-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const alvoId = btn.getAttribute('data-alvo');
                const input = document.getElementById(alvoId);
                if (!input) return;
                const icone = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icone.classList.remove('fa-eye');
                    icone.classList.add('fa-eye-slash');
                    btn.setAttribute('aria-label', 'Ocultar senha');
                } else {
                    input.type = 'password';
                    icone.classList.remove('fa-eye-slash');
                    icone.classList.add('fa-eye');
                    btn.setAttribute('aria-label', 'Mostrar senha');
                }
            });
        });
    </script>

</body>
</html>
