<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Perfil</title>

    <link rel="stylesheet" href="./Estilo/main.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<aside class="sidebar">

        <div class="logo">
            <img src="./imagens/socrates.png" alt="Logo">
        </div>

        <button class="menu-btn">
    <i class="fa-solid fa-bars"></i>
        </button>

        <nav>
            
     <a href="/home" title="Home">
        <img src="./imagens/Imagem1.png" alt="Dashboard">
    </a>

    <a href="/pesquisa" title="Pesquisar">
        <img src="./imagens/imagem5.png" alt="Dashboard">
    </a>

    <a href="/materiais" class="ativo" title="Materiais">
        <img src="./imagens/imagem6.png" alt="Materiais">
    </a>

    <a href="/upload" title="Upload">
       <img src="./imagens/imagem7.png" alt="Adicionar conteudo">
    </a>

    <a href="/alterar_perfil" title="Perfil">
        <img src="./imagens/Imagem2.png" alt="Perfil">
    </a>
        </nav>

        <div class="logout">
    <a href="/logout" title="Sair">
        <img src="./imagens/Imagem3.png" alt="Perfil">
    </a>
</div>
    </aside>


<main class="conteudo">
    
    <header>
        <div class="pesquisa">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Pesquisar Material">
        </div>

        <a href="/alterar_perfil" title="Meu perfil">
            <img src="{{FOTO}}" alt="{{NOME}}" class="avatar">
        </a>
    </header>

    <section class="topo">
        <h2>Materiais Enviados por você</h2>
    </section>

    <section class="cards" id="container-projetos">
        </section>

    <header class="sem-envio" id="mensagem-vazio" style="display: none; margin-top: 50px; text-align: center;">
        <h1>Você ainda não enviou nenhum conteúdo!!!</h1>
    </header>

</main>

<script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var msg = document.getElementById('mensagem');
        if (msg && params.get('sucesso')) {
            msg.style.display = 'block';
            msg.style.background = '#1f7a3a';
            msg.style.color = 'white';
            msg.textContent = 'Ação realizada com sucesso!';
        }
    })();

    fetch('/api/meus_projetos?nocache=' + new Date().getTime())
        .then(response => response.json())
        .then(projetos => {
            const container = document.getElementById('container-projetos');
            const msgVazio = document.getElementById('mensagem-vazio');

            if (projetos.length === 0) {
                msgVazio.style.display = 'block';
                return;
            }

            projetos.forEach(projeto => {
                const imagemSrc = projeto.capaUrl ? projeto.capaUrl : './imagens/Imagem4.png';
                
                const usr = projeto.Usuario || projeto.usuario;
                const fotoAutor = usr ? (usr.FotoPerfil || usr.fotoPerfil || usr.fotoperfil || usr.foto_perfil || usr.foto || './imagens/imagem8.jpg') : './imagens/imagem8.jpg';
                const nomeAutor = usr ? (usr.Nome || usr.nome || 'Usuário Desconhecido') : 'Usuário Desconhecido';
                
                const cardHTML = `
                <div class="card">
                    <img src="${imagemSrc}" alt="Capa do Projeto" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px 8px 0 0;">
                    
                    <h3 style="margin-top: 15px;">${projeto.titulo}</h3>
                    
                    <div class="info">
                        <span>Dificuldade</span>
                        <span>${projeto.dificuldade}</span>
                    </div>
                    
                    <div class="info">
                        <span>Tipo</span>
                        <span>${projeto.tipo}</span>
                    </div>

                    <p style="font-size: 13px; color: #a0a0a0; margin: 15px 0;">${projeto.descricao}</p>

                    <button class="btn-card" ${projeto.materialUrl ? `onclick="abrirVisualizador('${projeto.materialUrl}', '${projeto.tipo}')"` : `onclick="alert('Este projeto não possui nenhum arquivo de material anexado.')"`}>Visualizar</button>

                    ${projeto.materialUrl ? `<a class="btn-card" href="${projeto.materialUrl}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block;margin-top:8px;background:linear-gradient(to right,#6F52FF,#8B67FF);color:white;padding:10px;border-radius:10px;">Baixar material</a>` : ''}

                    <button class="btn-card" onclick="deletarProjeto(${projeto.id})" style="background: #ff5454; margin-top: 8px; color: white;"><i class="fa-solid fa-trash-can" style="margin-right: 5px;"></i> Excluir Conteúdo</button>
                </div>
                `;
                container.innerHTML += cardHTML;
            });
        })
        .catch(err => console.error('Erro ao carregar projetos:', err));
    
    function abrirVisualizador(url, tipo) {
            const modalAntigo = document.getElementById('modal-visualizador');
            if (modalAntigo) modalAntigo.remove();

            const modal = document.createElement('div');
            modal.id = 'modal-visualizador';
            modal.style.cssText = `
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
              background: rgba(0, 0, 0, 0.85);
              display: flex; justify-content: center; align-items: center;
              z-index: 100000; padding: 20px;
            `;

         const contentor = document.createElement('div');
         contentor.style.cssText = `
              position: relative; background: #1e1e2f; 
               padding: 15px; border-radius: 12px; 
              max-width: 90%; max-height: 90%; 
              display: flex; flex-direction: column; align-items: center;
             box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    `;

         const btnFechar = document.createElement('button');
            btnFechar.textContent = '×';
         btnFechar.style.cssText = `
              position: absolute; top: -15px; right: -15px;
             background: #ff5454; color: white; border: none;
                width: 32px; height: 32px; border-radius: 50%;
             font-size: 22px; cursor: pointer; display: flex;
              align-items: center; justify-content: center;
             box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    `;
         btnFechar.onclick = () => modal.remove();
         contentor.appendChild(btnFechar);

         if (tipo === 'Imagem') {
              const img = document.createElement('img');
              img.src = url;
              img.style.cssText = 'max-width: 100%; max-height: 75vh; border-radius: 6px;';
              contentor.appendChild(img);
         } else if (tipo === 'Video') {
              const video = document.createElement('video');
              video.src = url;
                video.controls = true;
              video.autoplay = true;
             video.style.cssText = 'max-width: 100%; max-height: 75vh; border-radius: 6px;';
                contentor.appendChild(video);
          } else if (tipo === 'PDF') {
             const iframe = document.createElement('iframe');
              iframe.src = url;
              iframe.style.cssText = 'width: 75vw; height: 75vh; border: none; border-radius: 6px;';
              contentor.appendChild(iframe);
          } else {
               modal.remove();
              alert('Formato de arquivo não suportado para pré-visualização.');
             return;
         }

          modal.appendChild(contentor);
         document.body.appendChild(modal);

         modal.onclick = (e) => {
               if (e.target === modal) modal.remove();
          };
        }
    
    function deletarProjeto(id) {
    if (confirm('Tem certeza absoluta que deseja excluir este material permanentemente? Esta ação não pode ser desfeita.')) {
        fetch(`/api/projetos/${id}`, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.sucesso) {
                alert(data.mensagem);
                window.location.reload();
            } else {
                alert(data.erro || 'Não foi possível excluir o material.');
            }
        })
        .catch(err => {
            console.error('Erro na requisição de exclusão:', err);
            alert('Erro ao conectar com o servidor.');
        });
    }
}
</script>

<script src="./interceptor.js"></script>

</body>
</html>
