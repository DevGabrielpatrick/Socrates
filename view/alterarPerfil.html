<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Perfil</title>

    <link rel="stylesheet" href="./Estilo/main.css">
    <link rel="stylesheet" href="./Estilo/perfil.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<aside class="sidebar">

        <div class="logo">
            <img src="./imagens/socrates.png" alt="Logo">
        </div>

        <button class="menu-btn">
    <i class="fa-solid fa-bars"></i>
        </button>

        <nav>

     <a href="/home" title="Home">
        <img src="./imagens/Imagem1.png" alt="Dashboard">
    </a>

    <a href="/pesquisa" title="Pesquisar">
        <img src="./imagens/imagem5.png" alt="Dashboard">
    </a>

    <a href="/materiais" title="Materiais">
        <img src="./imagens/imagem6.png" alt="Materiais">
    </a>

    <a href="/upload" title="Upload">
       <img src="./imagens/imagem7.png" alt="Adicionar conteudo">
    </a>

    <a href="/alterar_perfil" class="ativo" title="Perfil">
        <img src="./imagens/Imagem2.png" alt="Perfil">
    </a>
        </nav>

        <div class="logout">
    <a href="/logout" title="Sair">
        <img src="./imagens/Imagem3.png" alt="Perfil">
    </a>
</div>
    </aside>

<main class="conteudo">

    <h2>Configuração de perfil</h2>

    <div class="container">

        <div id="mensagem" style="display:none; margin-bottom:20px; padding:12px; border-radius:10px; text-align:center;"></div>

        <form action="/atualizar_perfil" method="POST" enctype="multipart/form-data" id="form-perfil">

            <div class="foto-area">

                <label>Foto de perfil</label>

                <div class="foto-wrapper">

                    <img
                        id="foto-preview"
                        src="https://i.pravatar.cc/250"
                        alt="Perfil"
                    >

                    <input type="file" name="foto" accept="image/png, image/jpeg, image/gif, image/webp">

                </div>

            </div>

            <div class="campo">

                <label>Nome</label>

                <input
                    type="text"
                    name="nome"
                    value="Josefina da Silva"
                    required
                >

            </div>

            <div class="campo">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="josefina57@gmail.com"
                    required
                >

            </div>

            <div class="campo">

                <label for="perfil">Perfil</label>
                <select id="perfil" name="perfil" required class="select-perfil">
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                </select>

            </div>

            <div class="campo">

                <label for="area">Área de Conhecimento</label>

                <input
                    type="text"
                    id="area"
                    name="area"
                    placeholder="Ex.: Ciências Exatas, Humanas, Biológicas..."
                >

            </div>

            <div class="campo" id="campo-curso">

                <label for="curso">Curso (caso seja aluno)</label>

                <input
                    type="text"
                    id="curso"
                    name="curso"
                    placeholder="Ex.: Engenharia de Computação"
                >

            </div>

            <div class="campo">

                <label for="senha">Trocar senha (deixe em branco para manter a atual)</label>

                <div class="senha-wrapper">
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="••••••"
                        autocomplete="new-password"
                    >
                    <button type="button" class="olho-btn" data-alvo="senha" aria-label="Mostrar senha">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

            </div>

            <div class="campo">

                <label for="confirmar-senha">Confirmar nova senha</label>

                <div class="senha-wrapper">
                    <input
                        type="password"
                        id="confirmar-senha"
                        name="confirmarSenha"
                        placeholder="••••••"
                        autocomplete="new-password"
                    >
                    <button type="button" class="olho-btn" data-alvo="confirmar-senha" aria-label="Mostrar senha">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

            </div>

            <div class="acoes">

                <button
                    type="button"
                    class="btn-excluir"
                >
                    Excluir conta
                </button>

                <button
                    type="submit"
                    class="btn-atualizar"
                >
                    Atualizar
                </button>

            </div>

        </form>

    </div>

</main>

<script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var msg = document.getElementById('mensagem');
        if (!msg) return;

        if (params.get('sucesso') === '1') {
            msg.style.display = 'block';
            msg.style.background = '#1f7a3a';
            msg.style.color = 'white';
            msg.textContent = 'Perfil atualizado com sucesso!';
        } else if (params.get('erro')) {
            var erros = {
                'campos_obrigatorios': 'Nome, email e perfil são obrigatórios.',
                'email_duplicado': 'Este email já está em uso por outra conta.',
                'senhas_nao_conferem': 'A senha e a confirmação não conferem.',
                'senha_curta': 'A nova senha deve ter pelo menos 6 caracteres.',
                'upload_falhou': 'Falha no upload da foto (tamanho máximo 5 MB, tipos: JPG, PNG, GIF, WEBP).',
                '1': 'Erro ao atualizar. Tente novamente.'
            };
            msg.style.display = 'block';
            msg.style.background = '#7a1f1f';
            msg.style.color = 'white';
            msg.textContent = erros[params.get('erro')] || 'Erro desconhecido.';
        }

        // Toggle do botão de olho (mesmo padrão do login.html)
        document.querySelectorAll('.olho-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var alvoId = btn.getAttribute('data-alvo');
                var input = document.getElementById(alvoId);
                if (!input) return;
                var icone = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icone.classList.remove('fa-eye');
                    icone.classList.add('fa-eye-slash');
                    btn.setAttribute('aria-label', 'Ocultar senha');
                } else {
                    input.type = 'password';
                    icone.classList.remove('fa-eye-slash');
                    icone.classList.add('fa-eye');
                    btn.setAttribute('aria-label', 'Mostrar senha');
                }
            });
        });

        // Pré-visualização da foto escolhida antes do upload
        var inputFoto = document.querySelector('input[type="file"][name="foto"]');
        var preview = document.getElementById('foto-preview');
        if (inputFoto && preview) {
            inputFoto.addEventListener('change', function () {
                var arquivo = inputFoto.files && inputFoto.files[0];
                if (!arquivo) return;
                var reader = new FileReader();
                reader.onload = function (e) { preview.src = e.target.result; };
                reader.readAsDataURL(arquivo);
            });
        }

        // Mostra/oculta o campo Curso conforme o perfil selecionado
        var selectPerfil = document.getElementById('perfil');
        var campoCurso = document.getElementById('campo-curso');
        var inputCurso = document.getElementById('curso');
        function sincronizarCurso() {
            if (!selectPerfil || !campoCurso) return;
            if (selectPerfil.value === 'aluno') {
                campoCurso.style.display = '';
            } else {
                campoCurso.style.display = 'none';
                if (inputCurso) inputCurso.value = '';
            }
        }
        if (selectPerfil) {
            selectPerfil.addEventListener('change', sincronizarCurso);
            sincronizarCurso();
        }

        // Validação no cliente: confirmação de senha
        var form = document.getElementById('form-perfil');
        if (form) {
            form.addEventListener('submit', function (e) {
                var senha = document.getElementById('senha').value;
                var confirmar = document.getElementById('confirmar-senha').value;
                if (senha || confirmar) {
                    if (senha.length < 6) {
                        e.preventDefault();
                        alert('A nova senha deve ter pelo menos 6 caracteres.');
                        return;
                    }
                    if (senha !== confirmar) {
                        e.preventDefault();
                        alert('A senha e a confirmação não conferem.');
                    }
                }
            });
        }
    })();
</script>

<script src="./interceptor.js"></script>

</body>
</html>
