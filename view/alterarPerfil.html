<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Perfil</title>

    <link rel="stylesheet" href="./Estilo/main.css">
    <link rel="stylesheet" href="./Estilo/perfil.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<aside class="sidebar">

        <div class="logo">
            <img src="./imagens/socrates.png" alt="Logo">
        </div>

        <button class="menu-btn">
    <i class="fa-solid fa-bars"></i>
        </button>

        <nav>

     <a href="/home" title="Home">
        <img src="./imagens/Imagem1.png" alt="Dashboard">
    </a>

    <a href="/pesquisa" title="Pesquisar">
        <img src="./imagens/imagem5.png" alt="Dashboard">
    </a>

    <a href="/materiais" title="Materiais">
        <img src="./imagens/imagem6.png" alt="Materiais">
    </a>

    <a href="/upload" title="Upload">
       <img src="./imagens/imagem7.png" alt="Adicionar conteudo">
    </a>

    <a href="/alterar_perfil" class="ativo" title="Perfil">
        <img src="./imagens/Imagem2.png" alt="Perfil">
    </a>
        </nav>

        <div class="logout">
    <a href="/logout" title="Sair">
        <img src="./imagens/Imagem3.png" alt="Perfil">
    </a>
</div>
    </aside>

<main class="conteudo">

    <h2>Configuração de perfil</h2>

    <div class="container">

        <div id="mensagem" style="display:none; margin-bottom:20px; padding:12px; border-radius:10px; text-align:center;"></div>

        <form action="/atualizar_perfil" method="POST" enctype="multipart/form-data">

            <div class="foto-area">

                <label>Foto de perfil</label>

                <div class="foto-wrapper">

                    <img
                        src="https://i.pravatar.cc/250"
                        alt="Perfil"
                    >

                    <input type="file" name="foto">

                </div>

            </div>

            <div class="campo">

                <label>Nome</label>

                <input
                    type="text"
                    name="nome"
                    value="Josefina da Silva"
                >

            </div>

            <div class="campo">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="josefina57@gmail.com"
                >

            </div>

            <div class="campo">

                <label for="senha">Trocar senha (deixe em branco para manter a atual)</label>

                <div class="senha-wrapper">
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="••••••"
                    >
                    <button type="button" class="olho-btn" data-alvo="senha" aria-label="Mostrar senha">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

            </div>

            <div class="acoes">

                <button
                    type="button"
                    class="btn-excluir"
                >
                    Excluir conta
                </button>

                <button
                    type="submit"
                    class="btn-atualizar"
                >
                    Atualizar
                </button>

            </div>

        </form>

    </div>

</main>

<script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var msg = document.getElementById('mensagem');
        if (!msg) return;

        if (params.get('sucesso') === '1') {
            msg.style.display = 'block';
            msg.style.background = '#1f7a3a';
            msg.style.color = 'white';
            msg.textContent = 'Perfil atualizado com sucesso!';
        } else if (params.get('erro')) {
            var erros = {
                'campos_obrigatorios': 'Nome e email são obrigatórios.',
                'email_duplicado': 'Este email já está em uso por outra conta.',
                'upload_falhou': 'Falha no upload da foto (tamanho máximo 5 MB, tipos: JPG, PNG, GIF, WEBP).',
                '1': 'Erro ao atualizar. Tente novamente.'
            };
            msg.style.display = 'block';
            msg.style.background = '#7a1f1f';
            msg.style.color = 'white';
            msg.textContent = erros[params.get('erro')] || 'Erro desconhecido.';
        }

        // Toggle do botão de olho (mesmo padrão do login.html)
        document.querySelectorAll('.olho-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var alvoId = btn.getAttribute('data-alvo');
                var input = document.getElementById(alvoId);
                if (!input) return;
                var icone = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icone.classList.remove('fa-eye');
                    icone.classList.add('fa-eye-slash');
                    btn.setAttribute('aria-label', 'Ocultar senha');
                } else {
                    input.type = 'password';
                    icone.classList.remove('fa-eye-slash');
                    icone.classList.add('fa-eye');
                    btn.setAttribute('aria-label', 'Mostrar senha');
                }
            });
        });
    })();
</script>

<script src="./interceptor.js"></script>

</body>
</html>
