<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./Estilo/login.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">
</head>
<body>
    
    <div class="circulo">
        <img src="./imagens/socrates.png" alt="Logo">
    </div>

    <div class="container">

        <h1>Login</h1>

        <form action="/login" method="POST">

            <div class="campo">
                <label for="usuario">Usuário (E-mail):</label>
                <input type="email" id="usuario" name="email" required>
                <a href="/cadastro">Não tenho conta/Registrar</a>
            </div>

            <div class="campo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
                <a href="#">Esqueci minha senha</a>
            </div>

        <button type="submit">Login</button>

        </form>
    </div>

    <script src="./interceptor.js"></script>

</body>
</html>
