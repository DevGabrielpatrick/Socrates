<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar</title>

    <link rel="stylesheet" href="./Estilo/main.css">
    <link rel="icon" href="./imagens/socratesroxo.png" type="image/png">

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <aside class="sidebar">

        <div class="logo">
            <img src="./imagens/socrates.png" alt="Logo">
        </div>

        <button class="menu-btn">
    <i class="fa-solid fa-bars"></i>
        </button>

        <nav>

     <a href="/home" title="Home">
        <img src="./imagens/Imagem1.png" alt="Dashboard">
    </a>

    <a href="/pesquisa" class="ativo" title="Pesquisar">
        <img src="./imagens/imagem5.png" alt="Dashboard">
    </a>

    <a href="/materiais" title="Materiais">
        <img src="./imagens/imagem6.png" alt="Materiais">
    </a>

    <a href="/upload" title="Upload">
       <img src="./imagens/imagem7.png" alt="Adicionar conteudo">
    </a>

    <a href="/alterar_perfil" title="Perfil">
        <img src="./imagens/Imagem2.png" alt="Perfil">
    </a>
        </nav>

        <div class="logout">
    <a href="/logout" title="Sair">
        <img src="./imagens/Imagem3.png" alt="Perfil">
    </a>
</div>
    </aside>

    <main class="conteudo">

        <header>

            <div class="pesquisa">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                type="text"
                id="campo-pesquisa"
                placeholder="Pesquisar por título, autor, área ou curso...">
            </div>

            <img
            src="./imagens/imagem8.jpg"
            alt="Usuário"
            class="avatar">

        </header>

        <section class="topo">

            <h2>Resultados da pesquisa</h2>

            <div class="filtros">
                <button class="ativo">Tudo</button>
                <button>Vídeos</button>
                <button>Apostilas</button>
            </div>

        </section>

        <section class="cards" id="resultados">

            <p style="color:#cfcfe6; text-align:center; grid-column: 1 / -1; margin-top:40px;">
                Digite algo no campo acima para buscar materiais.
            </p>

        </section>

    </main>

<script>
const botao = document.querySelector(".menu-btn");
const sidebar = document.querySelector(".sidebar");

botao.addEventListener("click", () => {
    sidebar.classList.toggle("ativo");
});

const campo = document.getElementById('campo-pesquisa');
const resultados = document.getElementById('resultados');

campo.addEventListener('input', function () {
    const termo = this.value.trim().toLowerCase();
    if (!termo) {
        resultados.innerHTML = '<p style="color:#cfcfe6; text-align:center; grid-column: 1 / -1; margin-top:40px;">Digite algo no campo acima para buscar materiais.</p>';
        return;
    }
    // Placeholder de busca — em produção, chamaria uma rota do servidor
    resultados.innerHTML = '<p style="color:#cfcfe6; text-align:center; grid-column: 1 / -1; margin-top:40px;">Buscando por "<strong>' + termo + '</strong>"...</p>';
});
</script>
<script src="./interceptor.js"></script>
</body>
</html>
